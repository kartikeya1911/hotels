<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Page - Hotel Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f9f9f9;
            color: #333;
        }
        header {
            background: #4CAF50;
            color: white;
            padding: 1rem 0;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #4CAF50;
            margin-bottom: 20px;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin: 10px 0 5px;
        }
        input, select, textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        footer {
            text-align: center;
            padding: 15px 0;
            background-color: #4CAF50;
            color: white;
            position: relative;
            bottom: 0;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Book Your Stay</h1>
</header>

<div class="container">
    <h1>Booking Form</h1>
    <form action="/submit-booking" method="POST">
        <!-- Personal Information -->
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
        
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
        
        <!-- Booking Details -->
        <label for="checkin">Check-In Date</label>
        <input type="date" id="checkin" name="checkin" required>
        
        <label for="checkout">Check-Out Date</label>
        <input type="date" id="checkout" name="checkout" required>
        
        <label for="roomType">Room Type</label>
        <select id="roomType" name="roomType" required>
            <option value="" disabled selected>Select a room type</option>
            <option value="single">Single Room</option>
            <option value="double">Double Room</option>
            <option value="suite">Suite</option>
        </select>
        
        <label for="guests">Number of Guests</label>
        <input type="number" id="guests" name="guests" min="1" max="10" placeholder="Enter number of guests" required>
        
        <!-- Additional Requests -->
        <label for="requests">Special Requests</label>
        <textarea id="requests" name="requests" rows="4" placeholder="Enter any special requests (optional)"></textarea>
        
        <!-- Submit Button -->
        <button type="submit">Submit Booking</button>
    </form>
</div>

<footer>
    <p>&copy; 2024 Hotel Management System. All Rights Reserved.</p>
</footer>

</body>
</html>
