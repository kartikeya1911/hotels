<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #74ebd5, #9face6);
    }

    .form-container {
      position: relative;
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
      padding: 40px 30px;
    }

    .form-box {
      text-align: center;
    }

    h2 {
      margin-bottom: 30px;
      font-size: 28px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1px;
      animation: floating 4s ease-in-out infinite;
    }

    .form-box form {
      width: 100%;
    }

    .input-box {
      position: relative;
      margin-bottom: 30px;
    }

    .input-box input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: none;
      border-bottom: 2px solid #fff;
      outline: none;
      background: transparent;
      color: #fff;
    }

    .input-box label {
      position: absolute;
      left: 0;
      top: 10px;
      color: #fff;
      pointer-events: none;
      transition: 0.5s;
    }

    .input-box input:focus ~ label,
    .input-box input:valid ~ label {
      top: -15px;
      color: #74ebd5;
      font-size: 12px;
    }

    .btn {
      width: 100%;
      padding: 10px 20px;
      border: none;
      outline: none;
      background: linear-gradient(135deg, #74ebd5, #9face6);
      border-radius: 25px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.5s;
    }

    .btn:hover {
      background: linear-gradient(135deg, #9face6, #74ebd5);
    }

    .toggle-link {
      margin-top: 15px;
      font-size: 14px;
      color: #fff;
    }

    .toggle-link a {
      color: #74ebd5;
      text-decoration: none;
      font-weight: bold;
    }

    .toggle-link a:hover {
      text-decoration: underline;
    }

    @keyframes floating {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .input-box input:focus,
    .input-box input:valid {
      border-bottom: 2px solid #74ebd5;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <div class="form-box">
      <h2>Register</h2>
      <form id="registerForm">
        <div class="input-box">
          <input type="text" id="registerUsername" required>
          <label>Username</label>
        </div>
        <div class="input-box">
          <input type="password" id="registerPassword" required>
          <label>Password</label>
        </div>
        <button type="submit" class="btn">Register</button>
        <p class="toggle-link">Already have an account? <a href="login.html">Login</a></p>
      </form>
    </div>
  </div>
</body>
</html>
